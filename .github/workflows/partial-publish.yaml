name: Publish Docker Images

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release:
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: "Publish Homebox"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: install buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build metadata
        id: prep
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (main image)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.release == false }}
            type=raw,value=nightly,enable=${{ inputs.release == true }}
            type=raw,value=latest,enable=${{ inputs.release == true }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.release == true }}

      - name: Build and push main image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.prep.outputs.build_time }}

      - name: Generate artifact attestation (main image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Extract metadata (rootless image)
        id: meta-rootless
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }}-rootless,enable=${{ inputs.release == false }}
            type=raw,value=nightly-rootless,enable=${{ inputs.release == true }}
            type=raw,value=latest-rootless,enable=${{ inputs.release == true }}
            type=raw,value=${{ inputs.tag }}-rootless,enable=${{ inputs.release == true }}

      - name: Build and push rootless image
        id: push-rootless
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rootless
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-rootless.outputs.tags }}
          labels: ${{ steps.meta-rootless.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.prep.outputs.build_time }}

      - name: Generate artifact attestation (rootless image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push-rootless.outputs.digest }}
          push-to-registry: true
