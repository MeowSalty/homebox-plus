name: Publish Docker Images

on:
  workflow_call:
    inputs:
      version_tag:
        required: false
        type: string
        default: ""
      build_version:
        required: true
        type: string
      publish_version_tag:
        required: false
        type: boolean
        default: false
      publish_latest:
        required: false
        type: boolean
        default: false
      publish_nightly:
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: "Publish Homebox"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: install buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build metadata
        id: prep
        shell: bash
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=nightly-$(date -u +'%Y%m%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (main image)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version_tag }},enable=${{ inputs.publish_version_tag && inputs.version_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
            type=raw,value=nightly,enable=${{ inputs.publish_nightly }}
            type=raw,value=${{ steps.prep.outputs.nightly_tag }},enable=${{ inputs.publish_nightly }}

      - name: Build and push main image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.build_version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.prep.outputs.build_time }}

      - name: Generate artifact attestation (main image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Extract metadata (rootless image)
        id: meta-rootless
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version_tag }}-rootless,enable=${{ inputs.publish_version_tag && inputs.version_tag != '' }}
            type=raw,value=latest-rootless,enable=${{ inputs.publish_latest }}
            type=raw,value=nightly-rootless,enable=${{ inputs.publish_nightly }}
            type=raw,value=${{ steps.prep.outputs.nightly_tag }}-rootless,enable=${{ inputs.publish_nightly }}

      - name: Build and push rootless image
        id: push-rootless
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rootless
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-rootless.outputs.tags }}
          labels: ${{ steps.meta-rootless.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.build_version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.prep.outputs.build_time }}

      - name: Generate artifact attestation (rootless image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push-rootless.outputs.digest }}
          push-to-registry: true
