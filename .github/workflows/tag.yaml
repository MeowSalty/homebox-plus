name: Publish Release

on:
  push:
    tags:
      - v*

jobs:
  resolve-release-flags:
    name: Resolve release publish flags
    runs-on: ubuntu-latest
    outputs:
      publish_latest: ${{ steps.flags.outputs.publish_latest }}
      publish_nightly: ${{ steps.flags.outputs.publish_nightly }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve flags
        id: flags
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --depth=1
          TAG_COMMIT="$(git rev-parse "$GITHUB_SHA")"
          MAIN_HEAD="$(git rev-parse "origin/main")"

          echo "publish_latest=true" >> "$GITHUB_OUTPUT"

          if [ "$TAG_COMMIT" = "$MAIN_HEAD" ]; then
            echo "publish_nightly=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_nightly=false" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: "Backend Server Tests"
    uses: ./.github/workflows/partial-backend.yaml

  frontend-tests:
    name: "Frontend and End-to-End Tests"
    uses: ./.github/workflows/partial-frontend.yaml

  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5

      - uses: pnpm/action-setup@v2
        with:
          version: 7.30.1

      - name: Build Frontend and Copy to Backend
        working-directory: frontend
        run: |
          pnpm install --shamefully-hoist
          pnpm run build
          cp -r ./.output/public ../backend/app/api/static/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          workdir: "backend"
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-tag:
    name: "Publish Tag"
    needs:
      - resolve-release-flags
    uses: ./.github/workflows/partial-publish.yaml
    with:
      version_tag: ${{ github.ref_name }}
      build_version: ${{ github.ref_name }}
      publish_version_tag: true
      publish_latest: ${{ needs.resolve-release-flags.outputs.publish_latest == 'true' }}
      publish_nightly: ${{ needs.resolve-release-flags.outputs.publish_nightly == 'true' }}

  docs-build:
    name: Build docs
    needs:
      - publish-tag
      - goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy-docs:
    name: Deploy docs
    needs:
      - docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
